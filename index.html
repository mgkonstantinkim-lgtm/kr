<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Игры</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Unbounded:wght@700;800&family=Nunito:wght@400;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#F5F5F7;--surface:#FFFFFF;--border:rgba(0,0,0,0.08);
  --text:#1A1A1F;--muted:rgba(26,26,31,0.45);--hover:rgba(0,0,0,0.03);
}
html.dark{
  --bg:#0F0F13;--surface:#1A1A22;--border:rgba(255,255,255,0.07);
  --text:#F0F0F5;--muted:rgba(240,240,245,0.45);--hover:rgba(255,255,255,0.04);
}
body{
  font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);
  min-height:100vh;display:flex;flex-direction:column;align-items:center;
  justify-content:center;padding:24px 16px;transition:background .3s,color .3s;
}
.header{text-align:center;margin-bottom:32px}
.title{
  font-family:'Unbounded',sans-serif;font-size:26px;font-weight:800;
  background:linear-gradient(135deg,#E8445A,#3B82F6);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;margin-bottom:6px;
}
.subtitle{font-size:14px;color:var(--muted);font-weight:600}
.games{display:flex;flex-direction:column;gap:12px;width:100%;max-width:360px;margin-bottom:24px}
.game-card{
  display:flex;align-items:center;gap:16px;
  background:var(--surface);border:1px solid var(--border);
  border-radius:18px;padding:18px;cursor:pointer;
  transition:background .15s,transform .1s,border-color .3s;
  text-decoration:none;color:inherit;
}
.game-card:active{transform:scale(0.97)}
.game-card:hover{background:var(--hover)}
.game-icon{
  width:60px;height:60px;border-radius:14px;
  display:flex;align-items:center;justify-content:center;
  font-size:30px;flex-shrink:0;
}
.icon-ttt{background:linear-gradient(135deg,rgba(232,68,90,0.15),rgba(59,130,246,0.15))}
.icon-2048{background:linear-gradient(135deg,rgba(246,124,95,0.2),rgba(237,194,46,0.2))}
.game-info{flex:1}
.game-name{font-family:'Unbounded',sans-serif;font-size:14px;font-weight:700;margin-bottom:4px}
.game-desc{font-size:12px;color:var(--muted);line-height:1.4}
.arrow{font-size:18px;color:var(--muted);flex-shrink:0}
.theme-row{display:flex;justify-content:center}
.theme-btn{
  display:flex;align-items:center;gap:8px;
  background:var(--surface);border:1px solid var(--border);
  border-radius:20px;padding:8px 18px;cursor:pointer;
  font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;
  color:var(--muted);transition:background .15s,border-color .3s;
}
.theme-btn:active{transform:scale(0.97)}
</style>
</head>
<body>
<div class="header">
  <div class="title">🎮 Игры</div>
  <div class="subtitle">Выберите игру</div>
</div>

<div class="games">
  <a class="game-card" href="tictactoe.html">
    <div class="game-icon icon-ttt">❌⭕</div>
    <div class="game-info">
      <div class="game-name">Крестики-нолики</div>
      <div class="game-desc">Играй с другом или против бота. Кто первый соберёт три в ряд?</div>
    </div>
    <div class="arrow">›</div>
  </a>
  <a class="game-card" href="2048.html">
    <div class="game-icon icon-2048">🔢</div>
    <div class="game-info">
      <div class="game-name">2048</div>
      <div class="game-desc">Соединяй плитки и доберись до числа 2048!</div>
    </div>
    <div class="arrow">›</div>
  </a>
</div>

<div class="theme-row">
  <button class="theme-btn" id="thBtn" onclick="toggleTheme()">
    <span id="thIcon">🌙</span>
    <span id="thLabel">Тёмная тема</span>
  </button>
</div>

<script>
  const tg = window.Telegram && window.Telegram.WebApp;
  if (tg) { tg.ready(); tg.expand(); }

  let isDark = localStorage.getItem('appTheme') === 'dark';

  function applyTheme() {
    document.documentElement.classList.toggle('dark', isDark);
    document.getElementById('thIcon').textContent = isDark ? '☀️' : '🌙';
    document.getElementById('thLabel').textContent = isDark ? 'Светлая тема' : 'Тёмная тема';
    if (tg) {
      tg.setHeaderColor(isDark ? '#0F0F13' : '#F5F5F7');
      tg.setBackgroundColor(isDark ? '#0F0F13' : '#F5F5F7');
    }
    localStorage.setItem('appTheme', isDark ? 'dark' : 'light');
  }

  function toggleTheme() { isDark = !isDark; applyTheme(); }

  applyTheme();
</script>
</body>
</html>
