<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>2048</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Unbounded:wght@700;800&family=Nunito:wght@600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#F5F4F0;--surface:#BBADA0;--cell-empty:rgba(205,193,180,0.55);
  --text:#776E65;--text-light:#F9F6F2;
  --score-bg:#BBADA0;--score-text:#F9F6F2;
  --t2:#EEE4DA;--t2c:#776E65;
  --t4:#EDE0C8;--t4c:#776E65;
  --t8:#F2B179;--t8c:#F9F6F2;
  --t16:#F59563;--t16c:#F9F6F2;
  --t32:#F67C5F;--t32c:#F9F6F2;
  --t64:#F65E3B;--t64c:#F9F6F2;
  --t128:#EDCF72;--t128c:#F9F6F2;
  --t256:#EDCC61;--t256c:#F9F6F2;
  --t512:#EDC850;--t512c:#F9F6F2;
  --t1024:#EDC53F;--t1024c:#F9F6F2;
  --t2048:#EDC22E;--t2048c:#F9F6F2;
}
html.dark{
  --bg:#0F0F13;--surface:#2A2A3A;--cell-empty:rgba(255,255,255,0.05);
  --text:#C0B8B0;--text-light:#F9F6F2;
  --score-bg:#22222E;--score-text:#F9F6F2;
  --t2:#2E2E3E;--t2c:#C0B8B0;
  --t4:#34304A;--t4c:#C0B8B0;
  --t8:#A06030;--t8c:#F9F6F2;
  --t16:#A04820;--t16c:#F9F6F2;
  --t32:#A03018;--t32c:#F9F6F2;
  --t64:#A02010;--t64c:#F9F6F2;
  --t128:#907830;--t128c:#F9F6F2;
  --t256:#907020;--t256c:#F9F6F2;
  --t512:#906510;--t512c:#F9F6F2;
  --t1024:#905A00;--t1024c:#F9F6F2;
  --t2048:#905000;--t2048c:#F9F6F2;
}
body{
  font-family:'Nunito',sans-serif;
  background:var(--bg);
  color:var(--text);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  min-height:100vh;
  padding:16px;
  transition:background .3s,color .3s;
}
.wrap{width:100%;max-width:420px}
.top{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.logo{font-family:'Unbounded',sans-serif;font-size:42px;font-weight:800;color:#F67C5F;letter-spacing:-2px;line-height:1}
.scores{display:flex;gap:8px}
.score-box{background:var(--score-bg);border-radius:10px;padding:8px 16px;text-align:center;min-width:72px;transition:background .3s}
.score-lbl{font-size:10px;font-weight:700;color:var(--score-text);opacity:.7;text-transform:uppercase;letter-spacing:.08em}
.score-val{font-family:'Unbounded',sans-serif;font-size:18px;font-weight:800;color:var(--score-text)}
.controls{display:flex;gap:8px;margin-bottom:12px}
.btn{
  flex:1;padding:12px 0;border:none;border-radius:10px;
  background:var(--score-bg);color:var(--score-text);
  font-family:'Nunito',sans-serif;font-size:14px;font-weight:700;
  cursor:pointer;transition:opacity .15s,background .3s;
}
.btn:active{opacity:.7}
.theme-btn{
  flex:0;padding:12px 16px;border:none;border-radius:10px;
  background:var(--score-bg);font-size:18px;cursor:pointer;
  transition:opacity .15s,background .3s;
}
.theme-btn:active{opacity:.7}
.hint{font-size:12px;color:var(--text);opacity:.55;text-align:center;margin-bottom:12px}
.board-wrap{
  background:var(--surface);
  border-radius:14px;
  padding:12px;
  touch-action:none;
  transition:background .3s;
}
.board{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.cell{
  aspect-ratio:1;border-radius:10px;
  background:var(--cell-empty);
  display:flex;align-items:center;justify-content:center;
  font-family:'Unbounded',sans-serif;font-weight:800;
  transition:background .1s,color .1s;
}
.cell span{
  display:block;
  font-size:clamp(13px,5vw,26px);
  transition:transform .12s cubic-bezier(.175,.885,.32,1.275);
}
.cell.pop span{animation:pop .2s cubic-bezier(.175,.885,.32,1.275)}
.cell.bump span{animation:bump .15s ease}
@keyframes pop{0%{transform:scale(0)}100%{transform:scale(1)}}
@keyframes bump{0%{transform:scale(1)}50%{transform:scale(1.25)}100%{transform:scale(1)}}
.msg{
  margin-top:14px;text-align:center;
  font-family:'Unbounded',sans-serif;font-size:16px;font-weight:800;
  min-height:26px;color:#F67C5F;letter-spacing:-.5px;
}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div style="display:flex;align-items:center;gap:12px"><a href="index.html" style="background:var(--score-bg);border:none;border-radius:10px;padding:8px 14px;font-size:13px;font-weight:700;color:var(--score-text);text-decoration:none;white-space:nowrap;transition:opacity .15s">‹ Назад</a><div class="logo">2048</div></div>
    <div class="scores">
      <div class="score-box"><div class="score-lbl">Счёт</div><div class="score-val" id="score">0</div></div>
      <div class="score-box"><div class="score-lbl">Рекорд</div><div class="score-val" id="best">0</div></div>
    </div>
  </div>
  <div class="controls">
    <button class="btn" onclick="newGame()">🔄 Новая игра</button>
    <button class="theme-btn" id="thBtn" onclick="toggleTheme()">🌙</button>
  </div>
  <div class="hint">Свайпайте по полю для хода</div>
  <div class="board-wrap">
    <div class="board" id="board"></div>
  </div>
  <div class="msg" id="msg"></div>
</div>

<script>
  const tg = window.Telegram && window.Telegram.WebApp;
  if (tg) { tg.ready(); tg.expand(); }

  const COLORS = {
    2:['--t2','--t2c'],4:['--t4','--t4c'],8:['--t8','--t8c'],
    16:['--t16','--t16c'],32:['--t32','--t32c'],64:['--t64','--t64c'],
    128:['--t128','--t128c'],256:['--t256','--t256c'],512:['--t512','--t512c'],
    1024:['--t1024','--t1024c'],2048:['--t2048','--t2048c']
  };

  let grid, score, best = 0, isDark = false;

  function cv(n) { return getComputedStyle(document.documentElement).getPropertyValue(n).trim(); }

  function renderBoard(animInfo) {
    const b = document.getElementById('board');
    b.innerHTML = '';
    for (let r = 0; r < 4; r++) {
      for (let c = 0; c < 4; c++) {
        const v = grid[r][c];
        const div = document.createElement('div');
        div.className = 'cell';
        const key = r + ',' + c;
        if (animInfo && animInfo.newCells && animInfo.newCells.has(key)) div.classList.add('pop');
        if (animInfo && animInfo.merged && animInfo.merged.has(key)) div.classList.add('bump');
        if (v) {
          const cols = COLORS[Math.min(v, 2048)] || ['--t2048', '--t2048c'];
          div.style.background = cv(cols[0]);
          div.style.color = cv(cols[1]);
          const sp = document.createElement('span');
          sp.textContent = v;
          if (v >= 100) sp.style.fontSize = 'clamp(11px,3.8vw,20px)';
          if (v >= 1000) sp.style.fontSize = 'clamp(9px,3vw,16px)';
          div.appendChild(sp);
        }
        b.appendChild(div);
      }
    }
    document.getElementById('score').textContent = score;
    if (score > best) { best = score; document.getElementById('best').textContent = best; }
  }

  function addRandom(anim) {
    const empty = [];
    for (let r = 0; r < 4; r++) for (let c = 0; c < 4; c++) if (!grid[r][c]) empty.push([r, c]);
    if (!empty.length) return;
    const [r, c] = empty[Math.floor(Math.random() * empty.length)];
    grid[r][c] = Math.random() < 0.9 ? 2 : 4;
    if (anim) anim.newCells.add(r + ',' + c);
  }

  function newGame() {
    grid = Array.from({length: 4}, () => Array(4).fill(0));
    score = 0;
    document.getElementById('msg').textContent = '';
    const a = {newCells: new Set(), merged: new Set()};
    addRandom(a); addRandom(a);
    renderBoard(a);
  }

  function slide(row) {
    let arr = row.filter(x => x), merged = new Set();
    for (let i = 0; i < arr.length - 1; i++) {
      if (arr[i] === arr[i + 1] && !merged.has(i)) {
        arr[i] *= 2; score += arr[i]; arr.splice(i + 1, 1); merged.add(i);
      }
    }
    while (arr.length < 4) arr.push(0);
    return arr;
  }

  function move(dir) {
    const prev = JSON.stringify(grid);
    const a = {newCells: new Set(), merged: new Set()};
    for (let i = 0; i < 4; i++) {
      let row;
      if (dir === 'left') row = grid[i];
      else if (dir === 'right') row = [...grid[i]].reverse();
      else if (dir === 'up') row = [grid[0][i], grid[1][i], grid[2][i], grid[3][i]];
      else row = [grid[3][i], grid[2][i], grid[1][i], grid[0][i]];
      const s = slide(row);
      if (dir === 'left') grid[i] = s;
      else if (dir === 'right') grid[i] = s.reverse();
      else if (dir === 'up') { for (let r = 0; r < 4; r++) grid[r][i] = s[r]; }
      else { for (let r = 0; r < 4; r++) grid[3 - r][i] = s[r]; }
    }
    if (JSON.stringify(grid) === prev) return;
    addRandom(a);
    renderBoard(a);
    if (tg && tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
    if (grid.some(r => r.includes(2048))) document.getElementById('msg').textContent = '🎉 Победа! Вы собрали 2048!';
    else if (!canMove()) document.getElementById('msg').textContent = '😢 Игра окончена!';
  }

  function canMove() {
    for (let r = 0; r < 4; r++) for (let c = 0; c < 4; c++) {
      if (!grid[r][c]) return true;
      if (c < 3 && grid[r][c] === grid[r][c + 1]) return true;
      if (r < 3 && grid[r][c] === grid[r + 1][c]) return true;
    }
    return false;
  }

  document.addEventListener('keydown', e => {
    const map = {ArrowLeft:'left',ArrowRight:'right',ArrowUp:'up',ArrowDown:'down'};
    if (map[e.key]) { e.preventDefault(); move(map[e.key]); }
  });

  let tx = 0, ty = 0;
  const bw = document.getElementById('board');
  bw.addEventListener('touchstart', e => {
    tx = e.touches[0].clientX; ty = e.touches[0].clientY;
  }, {passive: true});
  bw.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - tx;
    const dy = e.changedTouches[0].clientY - ty;
    if (Math.abs(dx) < 20 && Math.abs(dy) < 20) return;
    if (Math.abs(dx) > Math.abs(dy)) move(dx > 0 ? 'right' : 'left');
    else move(dy > 0 ? 'down' : 'up');
  }, {passive: true});

  function applyTheme() {
    document.documentElement.classList.toggle('dark', isDark);
    document.getElementById('thBtn').textContent = isDark ? '☀️' : '🌙';
    if (tg) {
      tg.setHeaderColor(isDark ? '#0F0F13' : '#F5F4F0');
      tg.setBackgroundColor(isDark ? '#0F0F13' : '#F5F4F0');
    }
    localStorage.setItem('theme2048', isDark ? 'dark' : 'light');
    renderBoard();
  }

  function toggleTheme() { isDark = !isDark; applyTheme(); }

  const saved = localStorage.getItem('theme2048');
  if (saved === 'dark') isDark = true;
  applyTheme();
  newGame();
</script>
</body>
</html>
